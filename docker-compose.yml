services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rss
      POSTGRES_PASSWORD: rss
      POSTGRES_DB: rss
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rss -d rss"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rss:rss@postgres:5432/rss

volumes:
  pgdata:
